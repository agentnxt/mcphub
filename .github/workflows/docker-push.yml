name: Build and Push MCP Servers to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - '**/Dockerfile'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/tsconfig.json'
      - '.github/workflows/docker-push.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      servers:
        description: 'Comma-separated server names to build (leave empty for all)'
        required: false
        type: string

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_PREFIX: agentnxt

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - agentcrew-mcp-server
          - argilla-mcp-server
          - aws-kb-retrieval-mcp-server
          - brave-search-mcp-server
          - calcom-mcp-server
          - camunda-mcp-server
          - cognitive-memory-mcp-server
          - dbhub-mcp-server
          - erpnext-mcp-server
          - everart-mcp-server
          - everything-mcp-server
          - evidently-mcp-server
          - evolution-mcp-server
          - exa-mcp-server
          - filesystem-mcp-server
          - g2-mcp
          - gdrive-mcp-server
          - ghost-mcp-server
          - github-mcp-server
          - gitlab-mcp-server
          - glitchtip-mcp-server
          - google-maps-mcp-server
          - grafana-mcp-server
          - hostinger-mcp
          - lago-mcp-server
          - langflow-mcp-server
          - liferay-mcp-server
          - limesurvey-mcp-server
          - litellm-mcp-server
          - logto-mcp-server
          - marquez-mcp-server
          - matomo-mcp-server
          - mautic-mcp-server
          - memory-mcp-server
          - mlflow-mcp-server
          - n8n-mcp-server
          - nextcloud-mcp-server
          - nocodb-mcp-server
          - ollama-mcp-server
          - opa-mcp-server
          - playwright-mcp-server
          - postiz-mcp-server
          - qdrant-mcp-server
          - redis-mcp-server
          - rustfs-mcp-server
          - searxng-mcp-server
          - sequentialthinking-mcp-server
          - simstudio-mcp-server
          - skyvern-mcp-server
          - slack-mcp-server
          - stalwart-mcp-server
          - surrealdb-mcp-server
          - temporal-mcp-server
          - tuwunel-mcp-server
          - txtai-mcp-server
          - typebot-mcp-server
          - uptime-kuma-mcp-server
          - woocommerce-mcp-server
          - wuzapi-mcp-server
          - zabbix-mcp-server
      fail-fast: false
      max-parallel: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for ${{ matrix.server }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.server }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{ branch }}-
            type=raw,value=latest,enable={{ is_default_branch }}
            type=semver,pattern={{ version }}

      - name: Check for changes in ${{ matrix.server }}
        id: changed
        run: |
          if [[ "${{ github.event.inputs.servers }}" != "" ]]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^${{ matrix.server }}/"; then
              echo "enabled=true" >> $GITHUB_OUTPUT
            else
              echo "enabled=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build and push ${{ matrix.server }}
        if: steps.changed.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.server }}
          file: ${{ matrix.server }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.server }}
          cache-to: type=gha,mode=max,scope=${{ matrix.server }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.VCS_REF }}
          outputs: type=docker,dest=/tmp/image-${{ matrix.server }}.tar
          provenance: type=slim

      - name: Upload image artifact
        if: steps.changed.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.server }}
          path: /tmp/image-${{ matrix.server }}.tar
          retention-days: 1

      - name: Image digest
        if: steps.changed.outputs.enabled == 'true'
        run: |
          echo "✅ Built and pushed ${{ matrix.server }}"
          echo "   Tags: ${{ steps.meta.outputs.tags }}"

  scan:
    needs: build-matrix
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: image-*
          path: /tmp/images
          merge-multiple: true

      - name: Load Docker images
        run: |
          for img in /tmp/images/*.tar; do
            docker load --input "$img"
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'docker.io/${{ secrets.DOCKER_USERNAME }}/filesystem-mcp-server:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  notify:
    needs: build-matrix
    runs-on: ubuntu-latest
    if: failure() && github.event_name != 'pull_request'
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Docker build failed for ${{ github.repository }}"
          echo "   Workflow: ${{ github.workflow }}"
          echo "   Run: ${{ github.run_id }}"
          echo "   Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
